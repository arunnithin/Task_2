<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <h1>CALCULATOR</h1>
   
    <div class="calci">
        <input type="number" class="display" placeholder="enter" autofocus>
    
        <div id="but1">
            <input type="button" value="c" id="bts1">
            <input type="button" value="(" id="bts1">
            <input type="button" value=")" id="bts1">
            <input type="button" value="%" id="bts1">
        </div>
        <div id="but2">
            <input type="button" value="9" id="bts">
            <input type="button" value="8" id="bts">
            <input type="button" value="7" id="bts">
            <input type="button" value="/" id="bts1">
        </div>
        <div id="but3">
            <input type="button" value="6" id="bts">
            <input type="button" value="5" id="bts">
            <input type="button" value="4" id="bts">
            <input type="button" value="*" id="bts1">
        </div>
        <div id="but4">
            <input type="button" value="3" id="bts">
            <input type="button" value="2" id="bts">
            <input type="button" value="1" id="bts">
            <input type="button" value="+" id="bts1">
        </div>
        <div id="but5">
            <input type="button" value="." id="bts">
            <input type="button" value="0" id="bts">
            <input type="button" value="=" id="bts">
            <input type="button" value="-" id="bts1">
        </div>
        <script src="index.js"></script>
</body>

</html>
